name: Update Claude News

on:
  schedule:
    - cron: "0 0 * * *"   # 每天 UTC 00:00（北京时间 08:00）自动跑
  workflow_dispatch: {}    # 也可在 Actions 页手动点一下立刻跑

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch news and generate page
        run: python fetch.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html data.json
          git diff --staged --quiet || git commit -m "chore: 自动更新新闻 $(date -u +%Y-%m-%d)"
          git push
